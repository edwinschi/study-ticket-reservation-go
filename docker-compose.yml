services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_reservation_go}
      POSTGRES_USER: ${POSTGRES_USER:-ticket_reservation_go}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_reservation_go}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ticket_reservation_go} -d ${POSTGRES_DB:-ticket_reservation_go}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  migrate:
    image: migrate/migrate:v4.18.3
    entrypoint: ["migrate"]
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-ticket_reservation_go}:${POSTGRES_PASSWORD:-ticket_reservation_go}@postgres:5432/${POSTGRES_DB:-ticket_reservation_go}?sslmode=disable",
        "up",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro

  api:
    build:
      context: .
    command: ["go", "run", "./cmd/api"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: :8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgres://${POSTGRES_USER:-ticket_reservation_go}:${POSTGRES_PASSWORD:-ticket_reservation_go}@postgres:5432/${POSTGRES_DB:-ticket_reservation_go}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      VISITOR_SESSION_TTL: ${VISITOR_SESSION_TTL:-720h}
      RESERVATION_TTL: ${RESERVATION_TTL:-15m}
      EXPIRATION_WORKER_INTERVAL: ${EXPIRATION_WORKER_INTERVAL:-5s}
      EXPIRATION_WORKER_BATCH_SIZE: ${EXPIRATION_WORKER_BATCH_SIZE:-100}
      STARTUP_TIMEOUT: ${STARTUP_TIMEOUT:-10s}
      READINESS_TIMEOUT: ${READINESS_TIMEOUT:-2s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - .:/app

  worker:
    build:
      context: .
    command: ["go", "run", "./cmd/worker"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgres://${POSTGRES_USER:-ticket_reservation_go}:${POSTGRES_PASSWORD:-ticket_reservation_go}@postgres:5432/${POSTGRES_DB:-ticket_reservation_go}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      VISITOR_SESSION_TTL: ${VISITOR_SESSION_TTL:-720h}
      RESERVATION_TTL: ${RESERVATION_TTL:-15m}
      EXPIRATION_WORKER_INTERVAL: ${EXPIRATION_WORKER_INTERVAL:-5s}
      EXPIRATION_WORKER_BATCH_SIZE: ${EXPIRATION_WORKER_BATCH_SIZE:-100}
      STARTUP_TIMEOUT: ${STARTUP_TIMEOUT:-10s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  k6:
    image: grafana/k6:0.54.0
    profiles: ["stress"]
    entrypoint: ["k6"]
    command: ["version"]
    environment:
      BASE_URL: ${K6_BASE_URL:-http://api:8080}
      VUS: ${K6_VUS:-100}
      DURATION: ${K6_DURATION:-30s}
    depends_on:
      api:
        condition: service_started
    working_dir: /scripts
    volumes:
      - ./stress/k6:/scripts:ro

  sqlc:
    image: sqlc/sqlc:latest
    profiles: ["tools"]
    working_dir: /src
    command: ["generate"]
    volumes:
      - .:/src

volumes:
  postgres_data:
  redis_data:
